services:
  - type: web
    name: webpulse-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUMMARY_PROVIDER
        value: rule-based
      - key: CORS_ORIGIN
        sync: false
      - key: GOOGLE_PSI_API_KEY
        sync: false
